general {
    lock_cmd = pidof hyprlock || hyprlock # Avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session # Lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on # To avoid having to press a key twice to turn on the display.
}

# For locking the screen after 10 minutes.
listener {
    timeout = 600 # 10 minutes.
    on-timeout = loginctl lock-session # Lock screen on timeout.
}

# For sending a notification alert after 9 minutes of inactivity.
listener {
    timeout = 540 # 9 minutes.
    on-timeout = notify-send "You have been inactive for 9 minutes. The screen will lock in 1 minute."
}

# For dimming the screen after 2 minutes of inactivity.
listener {
    timeout = 120 # 2 minutes.
    on-timeout = brightnessctl -s set 10 # Set monitor backlight to a minimum.
    on-resume = brightnessctl -r # Restore monitor backlight.
}
